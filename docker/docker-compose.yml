version: "3.9"

# ─────────────────────────────────────────────────────────
# PTT Walkie‑Talkie – Docker Compose (development)
# ─────────────────────────────────────────────────────────
# Services: nginx, laravel (php-fpm + queue worker), postgres,
#           redis, reverb, murmur
# ─────────────────────────────────────────────────────────

networks:
  ptt_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  murmur_data:
  laravel_storage:

services:

  # ── 1. NGINX (edge / reverse proxy) ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ptt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - laravel_storage:/var/www/html/storage/app/public:ro
    depends_on:
      - laravel
      - reverb
    networks:
      - ptt_net

  # ── 2. Laravel (PHP-FPM API + Inertia/React frontend) ─
  laravel:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.laravel
    container_name: ptt-laravel
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ptt
      DB_USERNAME: ptt
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      MUMBLE_ICE_HOST: murmur
      MUMBLE_ICE_PORT: 6502
      MUMBLE_ICE_SECRET: changeme
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    volumes:
      - ../backend:/var/www/html
      - laravel_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ptt_net

  # ── 3. Queue worker (same image as laravel) ────────────
  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.laravel
    container_name: ptt-worker
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=60
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ptt
      DB_USERNAME: ptt
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      MUMBLE_ICE_HOST: murmur
      MUMBLE_ICE_PORT: 6502
      MUMBLE_ICE_SECRET: changeme
      QUEUE_CONNECTION: redis
    volumes:
      - ../backend:/var/www/html
      - laravel_storage:/var/www/html/storage
    depends_on:
      - laravel
      - redis
    networks:
      - ptt_net

  # ── 4. PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ptt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ptt
      POSTGRES_USER: ptt
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptt -d ptt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ptt_net

  # ── 5. Redis (cache, queue, sessions, broadcast) ───────
  redis:
    image: redis:7-alpine
    container_name: ptt-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ptt_net

  # ── 6. Laravel Reverb (WebSocket server) ──────────────
  reverb:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.laravel
    container_name: ptt-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      APP_ENV: local
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ptt
      DB_USERNAME: ptt
      DB_PASSWORD: secret
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
    networks:
      - ptt_net

  # ── 7. Murmur (Mumble voice server) ───────────────────
  murmur:
    image: mumblevoip/mumble-server:latest
    container_name: ptt-murmur
    restart: unless-stopped
    environment:
      MUMBLE_CONFIG_ICE: "tcp -h 0.0.0.0 -p 6502"
      MUMBLE_CONFIG_ICESECRETWRITE: changeme
      MUMBLE_CONFIG_ICESECRETREAD: changeme
      MUMBLE_CONFIG_WELCOMETEXT: "PTT System"
      MUMBLE_SUPERUSER_PASSWORD: superpassword
    volumes:
      - murmur_data:/data
    ports:
      - "64738:64738"       # Mumble voice (TCP + UDP)
      - "64738:64738/udp"
      # 6502 is NOT exposed to host – internal only
    expose:
      - "6502"              # Ice RPC – internal network only
    networks:
      - ptt_net
